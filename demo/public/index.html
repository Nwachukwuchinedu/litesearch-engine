<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiteSearch — 10K Demo</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4e8;
    --muted: #6b7280;
    --accent: #3b82f6;
    --orange: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 8px; }
  h1 small { font-size: .8rem; color: var(--muted); font-weight: 400; }

  .toolbar { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .search-box {
    flex: 1; min-width: 200px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: var(--radius);
    font-size: 1rem; outline: none; transition: border-color .15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  select, button {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: var(--radius);
    font-size: .9rem; cursor: pointer;
  }
  select:hover { border-color: var(--accent); }

  .stats-bar {
    display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap;
    font-size: .8rem; color: var(--muted);
  }

  .meta { margin-top: 12px; font-size: .85rem; color: var(--muted); }

  .results { margin-top: 8px; }
  .hit {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; margin-bottom: 6px;
    transition: opacity .12s;
  }
  .hit-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .hit-title { font-weight: 600; font-size: 1rem; }
  .hit-title mark { background: transparent; color: var(--orange); font-weight: 700; }
  .hit-type {
    font-size: .65rem; padding: 2px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: .04em; font-weight: 600;
    white-space: nowrap;
  }
  .hit-type.user { background: #1e3a5f; color: var(--accent); }
  .hit-type.product { background: #0d3325; color: var(--green); }
  .hit-type.article { background: #3a2e0d; color: var(--orange); }

  .hit-details { margin-top: 4px; font-size: .82rem; color: var(--muted);
    display: flex; gap: 8px; flex-wrap: wrap; }
  .hit-details span { display: flex; align-items: center; gap: 3px; }
  .hit-score { color: var(--green); font-weight: 600; }
  .hit-body { margin-top: 4px; font-size: .82rem; color: #9ca3af; line-height: 1.5; }
  .hit-body mark { background: transparent; color: var(--orange); font-weight: 600; }

  .hit-tags { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
  .hit-tags span {
    font-size: .68rem; padding: 2px 8px; border-radius: 4px;
    background: #151721; border: 1px solid var(--border); color: var(--muted);
  }

  .pagination { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 12px; }
  .pagination button { padding: 6px 14px; font-size: .85rem; }
  .pagination .info { font-size: .85rem; color: var(--muted); }

  .empty { text-align: center; padding: 40px 0; color: var(--muted); }
  .error { color: var(--red); margin-top: 8px; }

  .details { display: none; margin-top: 4px; }
  .details.open { display: block; }
  .toggle-details { background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: .75rem; padding: 2px 0;
  }
  .toggle-details:hover { color: var(--accent); }
  .details pre { background: #151721; padding: 8px; border-radius: 4px;
    overflow-x: auto; font-size: .7rem; margin-top: 4px; }

  #facetsPanel { margin-top: 8px; padding: 10px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius); }
  .facet-bucket {
    display: inline-flex; align-items: center; gap: 4px;
    background: #151721; border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 10px; font-size: .78rem; cursor: pointer;
    margin: 2px;
  }
  .facet-bucket:hover { border-color: var(--accent); }
  .facet-bucket .count { color: var(--muted); font-size: .72rem; }
</style>
</head>
<body>
<div class="container">
  <h1>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    LiteSearch — 10K Documents
    <small id="docCount"></small>
  </h1>

  <div class="toolbar">
    <input type="text" id="searchInput" class="search-box"
      placeholder='Try "designer", "wireframe", "typescript", "jollof"...' autofocus>
    <select id="indexSelect">
      <option value="all">All</option>
      <option value="users">Users</option>
      <option value="products">Products</option>
      <option value="articles">Articles</option>
    </select>
  </div>

  <div class="stats-bar" id="statsBar"></div>
  <div class="meta"><span id="resultMeta"></span></div>
  <div id="facetsPanel" style="display:none"></div>
  <div id="results" class="results"></div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
const searchInput = document.getElementById("searchInput");
const indexSelect = document.getElementById("indexSelect");
const resultsEl = document.getElementById("results");
const metaEl = document.getElementById("resultMeta");
const paginationEl = document.getElementById("pagination");
const statsBar = document.getElementById("statsBar");
const docCount = document.getElementById("docCount");
const facetsPanel = document.getElementById("facetsPanel");

let currentQuery = "", currentOffset = 0, currentTotal = 0, currentLimit = 20;

fetch("/api/stats").then(r=>r.json()).then(s => {
  const t = s.users.documentCount + s.products.documentCount + s.articles.documentCount;
  docCount.textContent = t.toLocaleString() + " docs";
  statsBar.innerHTML = `
    <span>👤 ${s.users.documentCount.toLocaleString()} users</span>
    <span>📦 ${s.products.documentCount.toLocaleString()} products</span>
    <span>📄 ${s.articles.documentCount.toLocaleString()} articles</span>
    <span>🏷 ${(s.users.termCount + s.products.termCount + s.articles.termCount).toLocaleString()} terms</span>
  `;
});

function doSearch(offset = 0) {
  const q = searchInput.value.trim();
  currentQuery = q; currentOffset = offset;
  const index = indexSelect.value;
  const params = new URLSearchParams({ q, index, limit: currentLimit, offset, highlighted: "true" });

  resultsEl.style.opacity = ".35";
  const start = performance.now();

  fetch(`/api/search?${params}`)
    .then(r => r.json())
    .then(data => {
      resultsEl.style.opacity = "1";
      const took = ((performance.now() - start) / 1000).toFixed(2);
      renderResults(data, q, took);
    })
    .catch(err => { resultsEl.style.opacity = "1";
      resultsEl.innerHTML = `<div class="error">Error: ${err.message}</div>`; });
}

function renderResults(data, q, took) {
  const hits = data.hits || [];
  const total = data.total || 0;
  currentTotal = total;
  metaEl.textContent = `${total.toLocaleString()} matches in ${took}s`;

  if (!hits.length) {
    resultsEl.innerHTML = `<div class="empty"><h3>${q ? "No results" : "No documents"}</h3></div>`;
    paginationEl.innerHTML = ""; return;
  }

  resultsEl.innerHTML = hits.map(hit => {
    const d = hit.document || {};
    const index = d._index || indexSelect.value;
    const type = d.type || index.replace(/s$/, "");
    const title = d.name || d.title || d.email || d.id;
    const score = hit.score != null ? (hit.score * 100).toFixed(0) + "%" : "";

    let details = [];
    if (d.email) details.push(`✉ ${d.email}`);
    if (d.department) details.push(`🏢 ${d.department}`);
    if (d.skills?.length) details.push(`⚡ ${d.skills.slice(0, 3).join(", ")}`);
    if (d.category) details.push(`📁 ${d.category}`);
    if (d.brand) details.push(`🏷 ${d.brand}`);
    if (d.price != null) details.push(`💰 ₦${Number(d.price).toLocaleString()}`);
    if (d.author) details.push(`✍ ${d.author}`);
    if (d.wordCount) details.push(`📄 ${d.wordCount} words`);
    if (hit.matchType) details.push(`🔍 ${hit.matchType}`);

    const tags = d.tags || d.skills || [];
    const highlights = hit.highlights || [];
    let body = "";
    if (highlights.length) body = highlights.map(h => `<div class="hit-body">${h.snippet}</div>`).join("");
    else if (d.bio) body = `<div class="hit-body">${esc(d.bio.slice(0, 200))}</div>`;
    else if (d.description) body = `<div class="hit-body">${esc(d.description.slice(0, 200))}</div>`;
    else if (d.body) body = `<div class="hit-body">${esc(d.body.slice(0, 200))}</div>`;
    else if (d.email) body = `<div class="hit-body">${esc(d.email)}</div>`;

    const json = JSON.stringify(d, null, 2);

    return `<div class="hit">
      <div class="hit-header">
        <div class="hit-title">${esc(title)}</div>
        <span class="hit-type ${type}">${type}${index !== "all" ? "" : ` <span style="opacity:.6">(${index})</span>`}</span>
      </div>
      <div class="hit-details">${score ? `<span class="hit-score">${score}</span>` : ""} ${details.map(d => `<span>${d}</span>`).join("")}</div>
      ${body}
      ${tags?.length ? `<div class="hit-tags">${tags.slice(0, 6).map(t => `<span>${esc(typeof t === "string" ? t : t.name || "")}</span>`).join("")}</div>` : ""}
      <button class="toggle-details" onclick="this.nextElementSibling.classList.toggle('open')">JSON</button>
      <div class="details"><pre>${esc(json)}</pre></div>
    </div>`;
  }).join("");

  const pages = Math.ceil(total / currentLimit);
  const page = Math.floor(currentOffset / currentLimit) + 1;
  paginationEl.innerHTML = `
    <button onclick="doSearch(0)" ${currentOffset===0?"disabled":""}>First</button>
    <button onclick="doSearch(${Math.max(0,currentOffset - currentLimit)})" ${currentOffset===0?"disabled":""}>Prev</button>
    <span class="info">Page ${page} of ${pages} (${total.toLocaleString()})</span>
    <button onclick="doSearch(${currentOffset + currentLimit})" ${currentOffset+currentLimit>=total?"disabled":""}>Next</button>`;
}

function esc(s) { if (typeof s !== "string") s = String(s); const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

let debounceTimer;
searchInput.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => doSearch(0), 150);
});
searchInput.addEventListener("keydown", e => {
  if (e.key === "Escape") { searchInput.value = ""; doSearch(0); }
});
indexSelect.addEventListener("change", () => doSearch(0));

window.addEventListener("load", () => doSearch(0));
</script>
</body>
</html>
